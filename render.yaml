# Render deployment config for the Plant Watering app.
# Render reads this when you create a "Blueprint" from the GitHub repo.
# Secrets (DATABASE_URL, GOOGLE_API_KEY, SENSOR_API_TOKEN) are set in the Render
# dashboard, NOT here — sync:false keeps them out of the repo.
services:
  - type: web
    name: plant-watering
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # 1 worker keeps memory low on the free tier; 8 threads let slow DB calls run
    # concurrently so one slow request can't block all others. timeout 120 stops
    # gunicorn killing a worker mid-request during a slow Supabase connect / cold
    # start (the default 30s caused a kill-restart death spiral).
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    envVars:
      - key: DATABASE_URL        # Supabase pooler connection string
        sync: false
      - key: GOOGLE_API_KEY      # Gemini vision key
        sync: false
      - key: SENSOR_API_TOKEN    # optional: shared secret for /api/reading
        sync: false
      - key: SUPABASE_PROJECT_URL # https://<ref>.supabase.co — verifies /api/* JWTs via JWKS
        sync: false
      - key: SUPABASE_JWT_SECRET  # legacy alternative to SUPABASE_PROJECT_URL (HS256 projects)
        sync: false
      - key: CORS_ORIGINS         # optional: restrict API origins (default "*")
        sync: false
